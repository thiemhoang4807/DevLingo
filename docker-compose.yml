# ============================================
# 🐳 DevLingo - Docker Compose (Production)
# ============================================
# Chạy: docker compose up -d --build
# Dừng: docker compose down
# Xem logs: docker compose logs -f

services:
  # ==========================================
  # 🔧 Backend - Express + TypeORM + SQLite
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: devlingo-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-DEVLINGO_SUPER_SECRET_KEY_CHANGE_ME}
      - PORT=5000
      - DB_PATH=/app/data/devLingoDb.sqlite
      - CORS_ORIGIN=http://localhost
    volumes:
      # Persist SQLite database
      - backend-data:/app/data
      # Persist uploaded files
      - backend-uploads:/app/packages/backend/uploads
    networks:
      - devlingo-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/lessons"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # 🎨 Frontend - React + Vite (served by Nginx)
  # ==========================================
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        # URL API sẽ được resolve qua Nginx reverse proxy
        VITE_API_URL: http://localhost:5000
    container_name: devlingo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - devlingo-network

# ==========================================
# 💾 Volumes - Lưu trữ dữ liệu bền vững
# ==========================================
volumes:
  backend-data:
    driver: local
  backend-uploads:
    driver: local

# ==========================================
# 🌐 Network - Mạng nội bộ giữa các services
# ==========================================
networks:
  devlingo-network:
    driver: bridge
